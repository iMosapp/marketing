<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Add Task</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Helvetica Neue',sans-serif; color:#fff; max-width:430px; margin:0 auto; min-height:100vh; }

.header { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid #1C1C1E; }
.back { font-size:24px; color:#C9A962; text-decoration:none; padding:4px 8px; margin-right:8px; }
.header-title { font-size:18px; font-weight:700; flex:1; }

.section-label { font-size:11px; font-weight:700; color:#8E8E93; letter-spacing:1.5px; text-transform:uppercase; padding:20px 20px 8px; }

/* Card-grouped form (matches Add Contact style) */
.form-card { background:#1C1C1E; border-radius:12px; margin:0 16px 12px; border:1px solid #2C2C2E; overflow:hidden; }
.form-input { padding:14px 16px; font-size:16px; color:#fff; border:none; background:none; width:100%; outline:none; }
.form-input::placeholder { color:#48484A; }
.form-divider { height:1px; background:#2C2C2E; margin-left:16px; }
.form-row { display:flex; align-items:center; padding:12px 16px; gap:10px; }
.form-row-icon { font-size:18px; width:28px; text-align:center; flex-shrink:0; }
.form-row-input { flex:1; font-size:16px; color:#fff; background:none; border:none; outline:none; }
.form-row-input::placeholder { color:#48484A; }

/* Priority toggle */
.priority-row { display:flex; gap:8px; padding:12px 16px; }
.priority-btn { flex:1; padding:10px; border-radius:10px; text-align:center; font-size:14px; font-weight:600; cursor:pointer; border:1px solid #2C2C2E; background:#111; color:#8E8E93; }
.priority-btn.active-high { background:rgba(255,59,48,0.12); color:#FF3B30; border-color:#FF3B30; }
.priority-btn.active-med { background:rgba(255,150,0,0.12); color:#FF9500; border-color:#FF9500; }
.priority-btn.active-low { background:rgba(142,142,147,0.12); color:#8E8E93; border-color:#48484A; }

/* Action type */
.action-row { display:flex; gap:8px; padding:12px 16px; }
.action-btn { flex:1; padding:10px 8px; border-radius:10px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; border:1px solid #2C2C2E; background:#111; color:#8E8E93; }
.action-btn.active { background:rgba(201,169,98,0.12); color:#C9A962; border-color:#C9A962; }
.action-icon { font-size:18px; margin-bottom:2px; }

/* Contact picker */
.contact-pick { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; }
.contact-avatar { width:40px; height:40px; border-radius:12px; background:rgba(201,169,98,0.15); display:flex; align-items:center; justify-content:center; color:#C9A962; font-weight:700; font-size:14px; }
.contact-info { flex:1; }
.contact-name { font-size:15px; font-weight:600; }
.contact-phone { font-size:12px; color:#8E8E93; }
.contact-change { font-size:13px; color:#C9A962; font-weight:600; }

/* Save button */
.save-btn { margin:20px 16px; padding:16px; border-radius:14px; background:#C9A962; text-align:center; font-size:17px; font-weight:700; color:#000; cursor:pointer; }
.save-btn:active { opacity:0.8; }

.note { padding:8px 20px; font-size:12px; color:#48484A; text-align:center; line-height:1.4; }
.nav-link { display:block; text-align:center; padding:16px; font-size:13px; color:#C9A962; text-decoration:none; }
</style>
</head>
<body>

<div class="header">
  <a class="back" href="mockup-touchpoints.html">‹</a>
  <div class="header-title">Add Task</div>
</div>

<!-- Contact -->
<div class="section-label">Contact</div>
<div class="form-card">
  <div class="contact-pick">
    <div class="contact-avatar">BW</div>
    <div class="contact-info">
      <div class="contact-name">Bridger Ward</div>
      <div class="contact-phone">(801) 634-9122</div>
    </div>
    <div class="contact-change">Change</div>
  </div>
</div>

<!-- Task Details -->
<div class="section-label">Task Details</div>
<div class="form-card">
  <input class="form-input" type="text" placeholder="What needs to be done?" value="Follow up about trade-in value">
  <div class="form-divider"></div>
  <input class="form-input" type="text" placeholder="Notes (optional)" value="" style="font-size:14px; color:#8E8E93;">
</div>

<!-- When -->
<div class="section-label">When</div>
<div class="form-card">
  <div class="form-row">
    <div class="form-row-icon">📅</div>
    <div style="flex:1; font-size:16px; color:#fff;">Tomorrow, Mar 8</div>
    <div style="font-size:13px; color:#C9A962; font-weight:600;">Change</div>
  </div>
  <div class="form-divider"></div>
  <div class="form-row">
    <div class="form-row-icon">🕐</div>
    <div style="flex:1; font-size:16px; color:#fff;">9:00 AM</div>
    <div style="font-size:13px; color:#C9A962; font-weight:600;">Change</div>
  </div>
</div>

<!-- Priority -->
<div class="section-label">Priority</div>
<div class="form-card">
  <div class="priority-row">
    <div class="priority-btn active-high">High</div>
    <div class="priority-btn active-med" style="background:#111; color:#8E8E93; border-color:#2C2C2E;">Medium</div>
    <div class="priority-btn active-low" style="background:#111; color:#8E8E93; border-color:#2C2C2E;">Low</div>
  </div>
</div>

<!-- Action Type -->
<div class="section-label">Primary Action</div>
<div class="form-card">
  <div class="action-row">
    <div class="action-btn active">
      <div class="action-icon">📞</div>
      Call
    </div>
    <div class="action-btn">
      <div class="action-icon">💬</div>
      Text
    </div>
    <div class="action-btn">
      <div class="action-icon">✉️</div>
      Email
    </div>
    <div class="action-btn">
      <div class="action-icon">🎁</div>
      Card
    </div>
    <div class="action-btn">
      <div class="action-icon">📝</div>
      Other
    </div>
  </div>
</div>

<div class="save-btn">Save Task</div>

<div class="note">Task will appear in Today's Touchpoints on the due date</div>

<a class="nav-link" href="mockup-touchpoints.html">← Back to Touchpoints</a>
<a class="nav-link" href="mockup-home.html">← Back to Home</a>

</body>
</html>
